<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="row d-flex" id="productsContainer"></div>
    <script>
      const productsContainer = document.getElementById("productsContainer");
      fetch("https://dummyjson.com/products/add", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({
          title: "iPhone 9",
          description: "An apple mobile which is nothing like apple",
          thumbnail:
            "https://media.gadgetbytenepal.com/2025/09/iPhone-17-Pro-Max-Cosmic-Orange.jpg",
        }),
      })
        .then((res) => res.json())
        .then((data) => {
          const products = data;
          console.log(products);
          const productCard = `
              <div class="card" style="width: 18rem">
                 <img src="${products.thumbnail}" class="card-img-top" alt="..." />
                 <div class="card-body d-flex flex-column">
                    <h5 class="card-title">${products.title}</h5>
                        <p class="card-text">
                        ${products.description}
                        </p>
                        <a href="#" class="mt-auto btn btn-primary">Go somewhere</a>
                 </div>
              </div>
                `;

          productsContainer.innerHTML += productCard;
        });
    </script>
  </body>
</html>
